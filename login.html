<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioWatch - Acceso Corporativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-yellow: #fbc02d;
            --primary-yellow-hover: #f9a825;
            --text-dark: #374151;
            --text-muted: #9ca3af;
            --input-bg: #ffffff;
            --main-bg: #f3f4f6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e5e7eb;
        }

        /* ─── TARJETA PRINCIPAL ─── */
        .main-container {
            display: flex;
            width: 1000px;
            height: 600px;
            background-color: var(--main-bg);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* ─── PANEL IZQUIERDO ─── */
        .left-panel {
            flex: 1.2;
            background-image: url('fondo1.png');
            background-size: cover;
            background-position: center;
            position: relative;
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }

        .left-panel-content { position: relative; z-index: 2; }
        .left-panel h1 { font-size: 3rem; margin: 0; font-weight: 600; letter-spacing: 2px; }
        .left-panel p  { font-size: 1.2rem; margin: 10px 0 0; font-weight: 300; opacity: 0.9; }

        /* ─── PANEL DERECHO ─── */
        .right-panel {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-header { text-align: center; margin-bottom: 40px; }
        .login-header h2 { margin: 0; color: var(--text-dark); font-size: 1.8rem; font-weight: 600; }
        .login-header p  { margin: 5px 0 0; color: var(--text-muted); font-size: 0.95rem; }

        .form-container { width: 100%; max-width: 320px; }

        /* ─── INPUTS ─── */
        .input-group { position: relative; margin-bottom: 20px; }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-yellow);
            font-size: 1.2rem;
            pointer-events: none;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 1.5px solid transparent;
            background-color: var(--input-bg);
            border-radius: 50px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        input::placeholder { color: var(--text-muted); font-weight: 300; }

        input:focus {
            outline: none;
            border-color: rgba(251,192,45,0.5);
            box-shadow: 0 0 0 3px rgba(251,192,45,0.15);
        }

        /* ─── CHECKBOX ─── */
        .options-group {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .options-group input[type="checkbox"] {
            width: auto;
            padding: 0;
            margin-right: 10px;
            accent-color: var(--primary-yellow);
            box-shadow: none;
            border: none;
        }

        /* ─── BOTÓN PRINCIPAL ─── */
        .login-button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-yellow);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(251,192,45,0.3);
            transition: all 0.3s ease;
        }

        .login-button:hover {
            background-color: var(--primary-yellow-hover);
            box-shadow: 0 6px 10px rgba(251,192,45,0.4);
            transform: translateY(-1px);
        }

        .login-button:active { transform: translateY(1px); }

        /* ─── LINKS SECUNDARIOS ─── */
        .secondary-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .secondary-links a {
            color: var(--text-dark);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .secondary-links a:hover { color: var(--primary-yellow); }

        /* ─── MENSAJES ─── */
        .msg-error {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        /* ══════════════════════════════════════
           MODAL DE REGISTRO
        ══════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 35, 45, 0.55);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: #fff;
            border-radius: 20px;
            width: 520px;
            max-width: 95vw;
            max-height: 92vh;
            overflow-y: auto;
            padding: 40px 45px 36px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.18);
            position: relative;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
            opacity: 0;
            scrollbar-width: thin;
            scrollbar-color: #e5e7eb transparent;
        }

        .modal::-webkit-scrollbar { width: 5px; }
        .modal::-webkit-scrollbar-track { background: transparent; }
        .modal::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        /* Franja de color arriba */
        .modal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-yellow), #f9a825);
            border-radius: 20px 20px 0 0;
        }

        .modal-close {
            position: absolute;
            top: 18px; right: 22px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close:hover { color: var(--text-dark); }

        .modal-header { margin-bottom: 30px; }
        .modal-header h2 { margin: 0 0 4px; font-size: 1.6rem; font-weight: 600; color: var(--text-dark); }
        .modal-header p  { margin: 0; font-size: 0.9rem; color: var(--text-muted); }

        /* Grid de 2 columnas para el formulario */
        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-grid .full-width { grid-column: 1 / -1; }

        .field-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .modal input[type="text"],
        .modal input[type="email"],
        .modal input[type="password"] {
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            border: 1.5px solid #e5e7eb;
            background: #fafafa;
        }

        .modal input:focus {
            border-color: rgba(251,192,45,0.6);
            background: #fff;
        }

        /* Indicador de fortaleza */
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #e5e7eb;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .strength-text {
            font-size: 0.72rem;
            margin-top: 4px;
            color: var(--text-muted);
        }

        /* Separador */
        .modal-divider {
            height: 1px;
            background: #f0f0f0;
            margin: 24px 0;
        }

        /* Checkbox de términos */
        .terms-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 22px;
        }

        .terms-row input[type="checkbox"] {
            width: auto;
            padding: 0;
            margin-top: 2px;
            box-shadow: none;
            border: none;
            accent-color: var(--primary-yellow);
            flex-shrink: 0;
        }

        .terms-row a { color: var(--text-dark); font-weight: 600; text-decoration: none; }
        .terms-row a:hover { color: var(--primary-yellow); }

        /* Botón del modal */
        .register-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-yellow) 0%, #f9a825 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(251,192,45,0.35);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .register-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(251,192,45,0.45);
        }

        .register-button:active { transform: translateY(1px); }

        .register-button:disabled {
            background: #d1d5db;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner dentro del botón */
        .btn-spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mensajes del modal */
        .modal-msg {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 14px;
            min-height: 18px;
            display: none;
        }

        .modal-msg.error   { color: #ef4444; display: block; }
        .modal-msg.success { color: #22c55e; display: block; }
    </style>
</head>
<body>

    <!-- ─── LOGIN ─── -->
    <div class="main-container">
        <div class="left-panel">
            <div class="left-panel-content">
                <h1>BIOWATCH</h1>
                <p>Logística y Seguridad</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-header">
                <h2>Inicia sesión</h2>
                <p>en tu cuenta corporativa</p>
            </div>

            <div class="form-container">
                <div class="input-group">
                    <span class="input-icon">&#128100;</span>
                    <input type="text" id="user" placeholder="Usuario de Empresa" autocomplete="username">
                </div>

                <div class="input-group">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" id="pass" placeholder="Contraseña" autocomplete="current-password">
                </div>

                <div class="options-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Recordarme</label>
                </div>

                <button class="login-button" onclick="login()">INGRESAR</button>

                <p id="loginError" class="msg-error">Credenciales incorrectas. Verifica e intenta de nuevo.</p>

                <div class="secondary-links" style="margin-top: 30px;">
                    ¿Eres nuevo? <a onclick="openModal()">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         MODAL DE REGISTRO
    ══════════════════════════════════════ -->
    <div class="modal-overlay" id="registerModal" onclick="closeOnOverlay(event)">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">&times;</button>

            <div class="modal-header">
                <h2 id="modalTitle">Crear cuenta</h2>
                <p>Completa los datos para acceder a BioWatch</p>
            </div>

            <div class="modal-grid">
                <!-- Nombre -->
                <div>
                    <label class="field-label" for="reg_nombre">Nombre</label>
                    <input type="text" id="reg_nombre" placeholder="Juan" maxlength="60">
                </div>

                <!-- Apellido -->
                <div>
                    <label class="field-label" for="reg_apellido">Apellido</label>
                    <input type="text" id="reg_apellido" placeholder="García" maxlength="60">
                </div>

                <!-- Correo -->
                <div class="full-width">
                    <label class="field-label" for="reg_email">Correo corporativo</label>
                    <input type="email" id="reg_email" placeholder="juan.garcia@empresa.com" maxlength="120">
                </div>

                <!-- Usuario -->
                <div class="full-width">
                    <label class="field-label" for="reg_user">Usuario</label>
                    <input type="text" id="reg_user" placeholder="jgarcia" maxlength="40" oninput="sanitizeUsername(this)">
                </div>

                <!-- Contraseña -->
                <div class="full-width">
                    <label class="field-label" for="reg_pass">Contraseña</label>
                    <input type="password" id="reg_pass" placeholder="Mínimo 8 caracteres" maxlength="128" oninput="checkStrength(this.value)">
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <!-- Confirmar contraseña -->
                <div class="full-width">
                    <label class="field-label" for="reg_pass2">Confirmar contraseña</label>
                    <input type="password" id="reg_pass2" placeholder="Repite la contraseña" maxlength="128">
                </div>
            </div>

            <div class="modal-divider"></div>

            <div class="terms-row">
                <input type="checkbox" id="reg_terms">
                <label for="reg_terms">
                    Acepto los <a href="#">Términos de Uso</a> y el
                    <a href="#">Aviso de Privacidad</a> de BioWatch.
                </label>
            </div>

            <button class="register-button" id="regBtn" onclick="register()">CREAR CUENTA</button>

            <div class="modal-msg" id="regMsg"></div>
        </div>
    </div>

    <script>
        /* ══════════════════════════
           LÓGICA DE LOGIN
        ══════════════════════════ */
        async function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';

            if (!u || !p) {
                errEl.textContent = 'Por favor completa usuario y contraseña.';
                errEl.style.display = 'block';
                return;
            }

            /* 
            ── INTEGRACIÓN CON BASE DE DATOS ──────────────────────────────
            Reemplaza este bloque con tu llamada real al backend:

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (res.ok && data.token) {
                localStorage.setItem('bw_token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                errEl.textContent = data.message || 'Credenciales incorrectas.';
                errEl.style.display = 'block';
            }
            ─────────────────────────────────────────────────────────────── */

            // Credenciales de prueba (eliminar al conectar el backend)
            if (u === 'admin' && p === '1234') {
                window.location.href = 'dashboard.html';
            } else {
                errEl.textContent = 'Credenciales incorrectas. Verifica e intenta de nuevo.';
                errEl.style.display = 'block';
            }
        }

        // Enter en el formulario de login
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !document.getElementById('registerModal').classList.contains('active')) {
                login();
            }
        });

        /* ══════════════════════════
           MODAL — ABRIR / CERRAR
        ══════════════════════════ */
        function openModal() {
            document.getElementById('registerModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => document.getElementById('reg_nombre').focus(), 350);
        }

        function closeModal() {
            document.getElementById('registerModal').classList.remove('active');
            document.body.style.overflow = '';
            resetModal();
        }

        function closeOnOverlay(e) {
            if (e.target === document.getElementById('registerModal')) closeModal();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function resetModal() {
            ['reg_nombre','reg_apellido','reg_email','reg_user','reg_pass','reg_pass2'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('reg_terms').checked = false;
            document.getElementById('regMsg').className = 'modal-msg';
            document.getElementById('regMsg').textContent = '';
            document.getElementById('strengthFill').style.width = '0%';
            document.getElementById('strengthText').textContent = '';
            const btn = document.getElementById('regBtn');
            btn.disabled = false;
            btn.textContent = 'CREAR CUENTA';
        }

        /* ══════════════════════════
           INDICADOR DE FORTALEZA
        ══════════════════════════ */
        function checkStrength(value) {
            let score = 0;
            if (value.length >= 8)  score++;
            if (/[A-Z]/.test(value)) score++;
            if (/[0-9]/.test(value)) score++;
            if (/[^A-Za-z0-9]/.test(value)) score++;

            const fill  = document.getElementById('strengthFill');
            const label = document.getElementById('strengthText');
            const levels = [
                { pct: '0%',   color: '#e5e7eb', text: '' },
                { pct: '33%',  color: '#ef4444', text: 'Débil' },
                { pct: '66%',  color: '#f59e0b', text: 'Aceptable' },
                { pct: '85%',  color: '#3b82f6', text: 'Buena' },
                { pct: '100%', color: '#22c55e', text: 'Excelente' },
            ];
            fill.style.width      = levels[score].pct;
            fill.style.background = levels[score].color;
            label.textContent     = levels[score].text;
        }

        /* ══════════════════════════
           SANITIZAR USUARIO
        ══════════════════════════ */
        function sanitizeUsername(input) {
            input.value = input.value.toLowerCase().replace(/[^a-z0-9._-]/g, '');
        }

        /* ══════════════════════════
           LÓGICA DE REGISTRO
        ══════════════════════════ */
        async function register() {
            const nombre   = document.getElementById('reg_nombre').value.trim();
            const apellido = document.getElementById('reg_apellido').value.trim();
            const email    = document.getElementById('reg_email').value.trim();
            const username = document.getElementById('reg_user').value.trim();
            const pass     = document.getElementById('reg_pass').value;
            const pass2    = document.getElementById('reg_pass2').value;
            const terms    = document.getElementById('reg_terms').checked;
            const msgEl    = document.getElementById('regMsg');
            const btn      = document.getElementById('regBtn');

            // ── Validaciones cliente ─────────────────────────────────────
            msgEl.className = 'modal-msg';
            msgEl.textContent = '';

            if (!nombre || !apellido || !email || !username || !pass || !pass2) {
                showRegMsg('Todos los campos son obligatorios.', 'error');
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showRegMsg('El correo electrónico no es válido.', 'error');
                return;
            }
            if (pass.length < 8) {
                showRegMsg('La contraseña debe tener al menos 8 caracteres.', 'error');
                return;
            }
            if (pass !== pass2) {
                showRegMsg('Las contraseñas no coinciden.', 'error');
                return;
            }
            if (!terms) {
                showRegMsg('Debes aceptar los términos para continuar.', 'error');
                return;
            }

            // ── Spinner / deshabilitar botón ─────────────────────────────
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-spinner"></span>Creando cuenta...';

            /*
            ── INTEGRACIÓN CON BASE DE DATOS ──────────────────────────────
            Reemplaza este bloque con tu llamada real al backend:

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, apellido, email, username, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    showRegMsg('¡Cuenta creada! Espera la activación por parte de tu administrador.', 'success');
                    btn.textContent = '✓ Listo';
                    setTimeout(closeModal, 3000);
                } else {
                    showRegMsg(data.message || 'Error al crear la cuenta.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'CREAR CUENTA';
                }
            } catch (err) {
                showRegMsg('Error de conexión. Intenta más tarde.', 'error');
                btn.disabled = false;
                btn.textContent = 'CREAR CUENTA';
            }
            ─────────────────────────────────────────────────────────────── */

            // Simulación de llamada al servidor (eliminar al conectar el backend)
            await new Promise(r => setTimeout(r, 1500));
            showRegMsg('¡Cuenta creada exitosamente! Un administrador activará tu acceso.', 'success');
            btn.textContent = '✓ Listo';
            setTimeout(closeModal, 3200);
        }

        function showRegMsg(text, type) {
            const el = document.getElementById('regMsg');
            el.textContent = text;
            el.className = `modal-msg ${type}`;
        }
    </script>
</body>
</html>
